# docker-compose.yml de nop cho BTC (Portal doc file nay, chay container tren
# MiG H200). Cau truc mirror dung baseline-and-input/docker-compose-
# baseline.yml - cac dong danh dau "Don't change this to vllm-server" la yeu
# cau bat buoc tu BTC, GIU NGUYEN.
#
# QUAN TRONG - da xac nhan bang thuc nghiem: nop thang file baseline goc (image
# vllm/vllm-openai:v0.22.1, KHONG co weight bake san) van chay va ra diem
# (14.95), khong phai 0 (0 = loi/timeout theo cong thuc ERS). Nghia la ha tang
# BTC TU CAP /model cho container (model co dinh chung cho moi doi, ho tu
# mount, khong can tung doi tu tai/bake weight). Vi optimization hien tai chi
# la CLI flags (khong sua code/kernel), KHONG can tu build image rieng -
# tro thang vao image cong khai la du.
#
# Neu sau nay can code/kernel rieng (thu vien patch, custom kernel...) khong
# co san trong image goc, luc do moi can quay lai dung docker/Dockerfile +
# .github/workflows/docker-build-push.yml de tu build/push image rieng.
services:
  model:
    image: vllm/vllm-openai:v0.24.0
    entrypoint:
      - python3 #Don't change this to vllm-server
      - -m  #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server #Don't change this to vllm-server
    command:
      - --model=/model #Don't change this to vllm-server
      - --served-model-name=Qwen3.5-2B #Don't change this to vllm-server
      - --host=0.0.0.0 #Don't change this to vllm-server
      - --port=8000 #Don't change this to vllm-server
      - --max-model-len=262144
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      # Prefix caching: TRACE-ROUND1 CO 120 REQUEST NHUNG CHI 20 TO HOP
      # (system+user) DOC NHAT, moi to hop lap lai dung 6 lan (da verify bang
      # cach hash tung request trong trace-round1.jsonl). System prompt
      # (~39K ky tu) giong het nhau o CA 120 request. Nghia la sau lan dau,
      # 100/120 request se duoc prefix-cache-hit gan nhu toan bo prompt ->
      # giam TTFT rat manh. Day la toi uu quan trong nhat cho trace nay.
      - --enable-prefix-caching
      # Swap-space (CPU offload cho KV cache khi preempt) mac dinh cua vllm
      # la 4 GiB - qua nhieu so voi RAM chi 8GB cua MiG slice (Statement.txt
      # muc 1: "3 Core CPU, 8GB RAM"), co the gay OOM container. Ha xuong 1
      # GiB de an toan; voi trace nay (120 request, it unique, khong can qua
      # nhieu preemption) 1 GiB la du du.
      - --swap-space=1
      # Tat log tung request de giam overhead Python o tan so cao (khong anh
      # huong toi accuracy/latency serving, chi giam noise/CPU cho logging).
      - --disable-log-requests
      # KV cache FP8: CHUA BAT o day. Vi trace chi co 20 chuoi prompt doc
      # nhat (khong phai 120), ap luc VRAM thuc te thap hon ve tuong tuong
      # ban dau tu 262144 max-model-len. Bat --kv-cache-dtype=fp8 co the anh
      # huong Accuracy Gate (Delta phai <=0.10) - CHI bat sau khi da chay
      # scripts/eval_gpqa.py xac nhan van qua nguong. Bo comment dong duoi
      # khi da test xong:
      # - --kv-cache-dtype=fp8
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
